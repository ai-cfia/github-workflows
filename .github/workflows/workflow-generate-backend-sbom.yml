---
name: Generate Backend SBOM (Python/uv)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "GitHub runner image"
        required: false
        type: string
        default: "ubuntu-24.04"
      working-directory:
        description: "Backend directory containing pyproject.toml"
        required: false
        type: string
        default: "./backend"
      cyclonedx-spec-version:
        description: "CycloneDX spec version"
        required: false
        type: string
        default: "1.6"
    outputs:
      sbom:
        description: "Base64-encoded sbom.json"
        value: ${{ jobs.generate.outputs.sbom }}
  workflow_dispatch:
    inputs:
      runs-on:
        description: "GitHub runner image"
        required: false
        type: string
        default: "ubuntu-24.04"
      working-directory:
        description: "Backend directory containing pyproject.toml"
        required: false
        type: string
        default: "./backend"
      cyclonedx-spec-version:
        description: "CycloneDX spec version"
        required: false
        type: string
        default: "1.6"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      sbom: ${{ steps.export.outputs.sbom }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y build-essential python3-dev \
            libjpeg-dev zlib1g-dev libtiff-dev libfreetype6-dev \
            liblcms2-dev libwebp-dev libharfbuzz-dev libfribidi-dev \
            libxcb1-dev

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e

      - name: Generate SBOM
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
          CDX_SV: ${{ inputs.cyclonedx-spec-version }}
        run: |
          set -euo pipefail

          PROJECT_DIR="$(realpath "${WORKDIR}")"
          test -f "${PROJECT_DIR}/pyproject.toml"

          cd "${PROJECT_DIR}"

          uv sync --group dev --group sbom
          uv lock
          uv run cyclonedx-py environment \
            --output-reproducible -v --sv "${CDX_SV}" \
            --pyproject pyproject.toml \
            -o sbom.json
          echo '' >> sbom.json

          test -f "${PROJECT_DIR}/sbom.json"

      - name: Export SBOM as base64
        id: export
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          SBOM_PATH="$(realpath "${WORKDIR}/sbom.json")"
          echo "sbom=$(base64 -w 0 "${SBOM_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Scan SBOM for vulnerabilities
        uses: ./.github/workflows/workflow-sbom-security-scan.yml
        with:
          working-directory: ${{ inputs.working-directory }}
