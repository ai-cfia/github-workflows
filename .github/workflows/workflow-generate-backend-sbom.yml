---
name: Generate Backend SBOM (Python/uv)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "GitHub runner image"
        required: false
        type: string
        default: "ubuntu-24.04"
      working-directory:
        description: "Backend directory containing pyproject.toml"
        required: false
        type: string
        default: "./backend"
      cyclonedx-spec-version:
        description: "CycloneDX spec version"
        required: false
        type: string
        default: "1.6"
    outputs:
      sbom:
        description: "Base64-encoded sbom.json"
        value: ${{ jobs.generate.outputs.sbom }}
  workflow_dispatch:
    inputs:
      runs-on:
        description: "GitHub runner image"
        required: false
        type: string
        default: "ubuntu-24.04"
      working-directory:
        description: "Backend directory containing pyproject.toml"
        required: false
        type: string
        default: "./backend"
      cyclonedx-spec-version:
        description: "CycloneDX spec version"
        required: false
        type: string
        default: "1.6"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      sbom: ${{ steps.export.outputs.sbom }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y build-essential python3-dev \
            libjpeg-dev zlib1g-dev libtiff-dev libfreetype6-dev \
            liblcms2-dev libwebp-dev libharfbuzz-dev libfribidi-dev \
            libxcb1-dev

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Generate SBOM
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
          CDX_SV: ${{ inputs.cyclonedx-spec-version }}
        run: |
          set -euo pipefail

          PROJECT_DIR="$(realpath "${WORKDIR}")"
          test -f "${PROJECT_DIR}/pyproject.toml"

          cd "${PROJECT_DIR}"

          uv sync --group dev --group sbom
          uv lock
          uv run cyclonedx-py environment \
            --output-reproducible -v --sv "${CDX_SV}" \
            --pyproject pyproject.toml \
            -o sbom.json
          echo '' >> sbom.json

          test -f "${PROJECT_DIR}/sbom.json"

      - name: Export SBOM as base64
        id: export
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          SBOM_PATH="$(realpath "${WORKDIR}/sbom.json")"
          echo "sbom=$(base64 -w 0 "${SBOM_PATH}")" >> "$GITHUB_OUTPUT"

      - uses: anchore/scan-action@e286cbc3c2c32c6b8bb4180b424e5b101f59e051
        name: SBOM Security Scan
        id: scan
        with:
          sbom: ${{ inputs.working-directory }}/sbom.json
          fail-build: false

      - name: Check SBOM scan results
        run: cat ${{ steps.scan.outputs.sarif }}

      - name: Fix SARIF artifact locations
        # Grype SBOM scans don't include file locations, which causes GitHub Code Scanning
        # to reject the SARIF file. This adds the SBOM file as the artifact location.
        # See: https://github.com/microsoft/sarif-sdk/issues/2770
        env:
          WORKDIR: ${{ inputs.working-directory }}
        run: |
          SBOM_URI="${WORKDIR}/sbom.json"
          # Remove leading "./" to produce a clean relative path
          SBOM_URI="${SBOM_URI#./}"
          jq --arg uri "${SBOM_URI}" '
            def default_loc:
              {"uri": $uri, "uriBaseId": "%SRCROOT%"};
            .runs[] |= (
              .results //= [] |
              .results = [.results[] | (
                if .locations == null or .locations == [] then
                  .locations = [{"physicalLocation": {"artifactLocation": default_loc, "region": {"startLine": 1, "startColumn": 1, "endLine": 1, "endColumn": 1}}}]
                else
                  .locations = [.locations[] | (
                    if (.physicalLocation.artifactLocation.uri // "") == "" then
                      .physicalLocation.artifactLocation = default_loc
                    else .
                    end
                  )]
                end
              )]
            )
          ' "${{ steps.scan.outputs.sarif }}" > sarif-fixed.json
          mv sarif-fixed.json "${{ steps.scan.outputs.sarif }}"

      - name: Upload SBOM scan results
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: sbom-security-scan
