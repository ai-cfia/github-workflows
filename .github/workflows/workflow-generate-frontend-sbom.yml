---

name: Generate Frontend SBOM (Node/npm)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "GitHub runner image"
        required: false
        type: string
        default: "ubuntu-24.04"
      working-directory:
        description: "Frontend directory containing package.json (relative to repo root)"
        required: false
        type: string
        default: "./frontend"
      cyclonedx-spec-version:
        description: "CycloneDX spec version"
        required: false
        type: string
        default: "1.6"
    outputs:
      sbom:
        description: "Base64-encoded sbom.json"
        value: ${{ jobs.generate.outputs.sbom }}
  workflow_dispatch:
    inputs:
      runs-on:
        description: "GitHub runner image"
        required: false
        type: string
        default: "ubuntu-24.04"
      working-directory:
        description: "Frontend directory containing package.json (relative to repo root)"
        required: false
        type: string
        default: "./frontend"
      cyclonedx-spec-version:
        description: "CycloneDX spec version"
        required: false
        type: string
        default: "1.6"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      sbom: ${{ steps.export.outputs.sbom }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Node/npm versions from package.json engines
        id: versions
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          PROJECT_DIR="$(realpath "${WORKDIR}")"

          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Error: Directory '$PROJECT_DIR' does not exist" >&2
            exit 1
          fi
          if [ ! -f "$PROJECT_DIR/package.json" ]; then
            echo "Error: package.json not found in '$PROJECT_DIR'" >&2
            exit 1
          fi

          NODE_VERSION=$(grep -o '"node": "[^"]*"' "$PROJECT_DIR/package.json" | sed 's/"node": "//; s/"//; s/\^//; s/~//; s/>=//') || true
          NPM_VERSION=$(grep -o '"npm": "[^"]*"' "$PROJECT_DIR/package.json" | sed 's/"npm": "//; s/"//; s/\^//; s/~//; s/>=//') || true

          NODE_VERSION="${NODE_VERSION:-20}"
          NPM_VERSION="${NPM_VERSION:-10}"

          echo "Detected Node.js version: $NODE_VERSION"
          echo "Detected npm version: $NPM_VERSION"

          echo "node_version=$NODE_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_version=$NPM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Remove node_modules (clean install)
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          PROJECT_DIR="$(realpath "${WORKDIR}")"
          sudo rm -rf "$PROJECT_DIR/node_modules"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.versions.outputs.node_version }}

      - name: Generate SBOM
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
          CDX_SV: ${{ inputs.cyclonedx-spec-version }}
          NODE_VERSION: ${{ steps.versions.outputs.node_version }}
          NPM_VERSION: ${{ steps.versions.outputs.npm_version }}
        run: |
          set -euo pipefail
          PROJECT_DIR="$(realpath "${WORKDIR}")"

          cd "${PROJECT_DIR}"
          npm install -g "npm@${NPM_VERSION}"
          npm install
          npm update
          npx cyclonedx-npm package-lock.json \
            --output-reproducible \
            --package-lock-only \
            -v --sv "${CDX_SV}" \
            -o sbom.json
          echo '' >> sbom.json

          test -f "${PROJECT_DIR}/sbom.json"
          echo "SBOM generated: ${PROJECT_DIR}/sbom.json"

      - name: Export SBOM as base64
        id: export
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          SBOM_PATH="$(realpath "${WORKDIR}/sbom.json")"
          echo "sbom=$(base64 -w 0 "${SBOM_PATH}")" >> "$GITHUB_OUTPUT"

      - uses: anchore/scan-action@e286cbc3c2c32c6b8bb4180b424e5b101f59e051
        name: SBOM Security Scan
        id: scan
        with:
          sbom: ${{ inputs.working-directory }}/sbom.json
          fail-build: false

      - name: Check SBOM scan results
        run: cat ${{ steps.scan.outputs.sarif }}

      - name: Fix SARIF artifact locations
        # Grype SBOM scans don't include file locations, which causes GitHub Code Scanning
        # to reject the SARIF file. This adds the SBOM file as the artifact location.
        # See: https://github.com/microsoft/sarif-sdk/issues/2770
        env:
          WORKDIR: ${{ inputs.working-directory }}
        run: |
          SBOM_URI="${WORKDIR}/sbom.json"
          # Remove leading "./" to produce a clean relative path
          SBOM_URI="${SBOM_URI#./}"
          jq --arg uri "${SBOM_URI}" '
            def default_loc:
              {"uri": $uri, "uriBaseId": "%SRCROOT%"};
            .runs[] |= (
              .results //= [] |
              .results = [.results[] | (
                if .locations == null or .locations == [] then
                  .locations = [{"physicalLocation": {"artifactLocation": default_loc, "region": {"startLine": 1, "startColumn": 1, "endLine": 1, "endColumn": 1}}}]
                else
                  .locations = [.locations[] | (
                    if (.physicalLocation.artifactLocation.uri // "") == "" then
                      .physicalLocation.artifactLocation = default_loc
                    else .
                    end
                  )]
                end
              )]
            )
          ' "${{ steps.scan.outputs.sarif }}" > sarif-fixed.json
          mv sarif-fixed.json "${{ steps.scan.outputs.sarif }}"

      - name: Upload SBOM scan results
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: sbom-security-scan
